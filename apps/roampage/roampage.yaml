# =========================
# PVC
# =========================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roampage-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
# =========================
# DEPLOYMENT
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roampage
  labels:
    app: roampage
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: roampage

  template:
    metadata:
      labels:
        app: roampage

    spec:
      containers:
        - name: roampage
          image: anagraphy/roampage:latest
          imagePullPolicy: Always

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"

          env:
            - name: PORT
              value: "3000"

            - name: CONFIG_PATH
              value: "/data/config.json"

            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: roampage-secret
                  key: ENCRYPTION_KEY

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: roampage-data

---
# =========================
# SERVICE (NODEPORT)
# =========================
apiVersion: v1
kind: Service
metadata:
  name: roampage-svc
spec:
  selector:
    app: roampage

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30460

  type: NodePort