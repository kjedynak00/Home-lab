apiVersion: v1
kind: PersistentVolume
metadata:
  name: vaultwarden-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: "" 
  hostPath:
    path: /mnt/NAS/home-lab/data/vaultwarden
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeName: vaultwarden-pv
  storageClassName: "" 
  resources:
    requests:
      storage: 5Gi

# Deployment for Vaultwarden
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:latest
          imagePullPolicy: Always # autoupdate to latest version
          ports:
            - containerPort: 80

          env:
            - name: TZ
              value: Europe/Warsaw

            - name: SIGNUPS_ALLOWED
              value: "true"

            - name: INVITATIONS_ALLOWED
              value: "false"

          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          volumeMounts:
            - name: vaultwarden-data
              mountPath: /data

      volumes:
        - name: vaultwarden-data
          persistentVolumeClaim:
            claimName: vaultwarden-pvc

# Service to expose Vaultwarden
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
spec:
  type: NodePort
  selector:
    app: vaultwarden
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30380
  type: NodePort