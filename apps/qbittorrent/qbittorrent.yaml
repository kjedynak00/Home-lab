---
# WAVE -5: ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-config
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
data:
  qbittorrent.conf: |
    [BitTorrent]
    Session\AddTorrentStopped=false
    Session\Port=44344
    Session\QueueingSystemEnabled=true
    Session\SSL\Port=44344
    Session\ShareLimitAction=Stop
    [Meta]
    MigrationVersion=8
    [Network]
    Proxy\HostnameLookupEnabled=false
    Proxy\Profiles\BitTorrent=true
    Proxy\Profiles\Misc=true
    Proxy\Profiles\RSS=true
    [Preferences]
    WebUI\BypassAuthentication=false
    WebUI\CSRFProtection=false
    WebUI\HostHeaderValidation=false
    WebUI\TrustedInterfaces=0.0.0.0/0
    WebUI\Port=8080
---
# WAVE -5: Storage (PVC/PV)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config-pvc
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-downloads-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.0
    - hard
  nfs:
    server: 192.168.100.91
    path: /volumeUSB2/usbshare

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-downloads-pvc
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    volume.beta.kubernetes.io/storage-class: ""
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  volumeName: qbittorrent-downloads-pv

---
# WAVE 5: Deployment + Service
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: NodePort
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
      nodePort: 30000
      protocol: TCP
    - name: bittorrent-tcp
      port: 6881
      targetPort: 6881
      nodePort: 44344
      protocol: TCP
    - name: bittorrent-udp
      port: 6881
      targetPort: 6881
      nodePort: 44344
      protocol: UDP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: config-init
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /config/qBittorrent
              if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                cp /tmp/qbittorrent.conf /config/qBittorrent/qBittorrent.conf
                chown -R 1000:1000 /config/qBittorrent
                chmod 644 /config/qBittorrent/qBittorrent.conf
              fi
              rm -f /config/qBittorrent/qBittorrent-data.conf
          volumeMounts:
            - name: config
              mountPath: /config
            - name: qbittorrent-config
              mountPath: /tmp
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "700m"
          ports:
            - containerPort: 8080
            - containerPort: 6881
              protocol: TCP
            - containerPort: 6881
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Warsaw"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "44344"
            - name: UMASK
              value: "002"
            - name: CONFIG_DIR
              value: "/config/qBittorrent"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads-pvc
        - name: qbittorrent-config
          configMap:
            name: qbittorrent-config
            defaultMode: 0644
            items:
              - key: qbittorrent.conf
                path: qbittorrent.conf
