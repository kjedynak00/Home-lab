---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-config-seed
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
data:
  qBittorrent.conf: |
    [BitTorrent]
    Session\AddTorrentStopped=false
    Session\Port=30000
    Session\QueueingSystemEnabled=true
    Session\SSL\Port=41125
    Session\ShareLimitAction=Stop
    [Meta]
    MigrationVersion=8
    [Network]
    Proxy\HostnameLookupEnabled=false
    Proxy\Profiles\BitTorrent=true
    Proxy\Profiles\Misc=true
    Proxy\Profiles\RSS=true
    [Preferences]
    WebUI\BypassAuthentication=false
    WebUI\CSRFProtection=false
    WebUI\HostHeaderValidation=false
    WebUI\TrustedInterfaces=0.0.0.0/0
    WebUI\Port=8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: config-init
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /config/qBittorrent
              if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                cp /seed/qBittorrent.conf /config/qBittorrent/qBittorrent.conf
              fi
              sed -i '/^WebUI\\Password/d' /config/qBittorrent/qBittorrent.conf || true
              sed -i '/^WebUI\\Username/d' /config/qBittorrent/qBittorrent.conf || true
              chown -R 1000:1000 /config
              chmod 664 /config/qBittorrent/qBittorrent.conf || true
              rm -f /config/qBittorrent/qBittorrent-data.conf
              rm -f /config/qBittorrent/lockfile
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-seed
              mountPath: /seed
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Warsaw"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "30000"
            - name: UMASK
              value: "002"
          ports:
            - containerPort: 8080
            - containerPort: 30000
              protocol: TCP
            - containerPort: 30000
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads-pvc
        - name: config-seed
          configMap:
            name: qbittorrent-config-seed
            defaultMode: 0644

---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: NodePort
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
      nodePort: 30000
      protocol: TCP
    - name: bittorrent-tcp
      port: 30000
      targetPort: 30000
      nodePort: 30681
      protocol: TCP
    - name: bittorrent-udp
      port: 30000
      targetPort: 30000
      nodePort: 30682
      protocol: UDP
