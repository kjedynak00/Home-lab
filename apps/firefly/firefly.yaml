# =========================
# PVC - POSTGRESQL
# =========================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefly-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

---
# =========================
# PVC - FIREFLY III UPLOADS
# =========================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefly-upload-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
# =========================
# POSTGRESQL DEPLOYMENT
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-postgres
  labels:
    app: firefly-postgres
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: firefly-postgres

  template:
    metadata:
      labels:
        app: firefly-postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          env:
            - name: POSTGRES_DB
              value: "firefly"

            - name: POSTGRES_USER
              value: "firefly"

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: DB_PASSWORD

            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"

            - name: TZ
              value: "Europe/Warsaw"

            - name: PGTZ
              value: "Europe/Warsaw"

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U firefly -d firefly
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U firefly -d firefly
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U firefly -d firefly
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: firefly-postgres-data

---
# =========================
# POSTGRESQL SERVICE
# =========================
apiVersion: v1
kind: Service
metadata:
  name: firefly-postgres-svc
spec:
  selector:
    app: firefly-postgres

  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432

  type: ClusterIP

---
# =========================
# FIREFLY III DEPLOYMENT
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly
  labels:
    app: firefly
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: firefly

  template:
    metadata:
      labels:
        app: firefly

    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent

          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: DB_PASSWORD

          command:
            - /bin/sh
            - -c
            - |
              until pg_isready \
                -h firefly-postgres-svc \
                -p 5432 \
                -U firefly \
                -d firefly
              do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done

      containers:
        - name: firefly
          image: fireflyiii/core
          imagePullPolicy: Always

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          env:
            - name: APP_ENV
              value: "production"

            - name: APP_DEBUG
              value: "false"

            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: APP_KEY

            - name: TRUSTED_PROXIES
              value: "**"

            - name: TZ
              value: "Europe/Warsaw"

            - name: DEFAULT_LANGUAGE
              value: "pl_PL"

            - name: DEFAULT_LOCALE
              value: "equal"

            - name: DB_CONNECTION
              value: "pgsql"

            - name: DB_HOST
              value: "firefly-postgres-svc"

            - name: DB_PORT
              value: "5432"

            - name: DB_DATABASE
              value: "firefly"

            - name: DB_USERNAME
              value: "firefly"

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: DB_PASSWORD

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: upload-data
              mountPath: /var/www/html/storage/upload

      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: firefly-upload-data

---
# =========================
# FIREFLY III SERVICE
# =========================
apiVersion: v1
kind: Service
metadata:
  name: firefly-svc
spec:
  selector:
    app: firefly

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30461

  type: NodePort
