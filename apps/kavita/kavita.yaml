---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavita
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      containers:
        - name: kavita
          image: lscr.io/linuxserver/kavita:latest
          imagePullPolicy: Always #autoupdate to latest version
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 65
            periodSeconds: 20
          resources:
            requests:
              memory: "500Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "700m"
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: kavita-secrets
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: books
              mountPath: /books
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: kavita-config-pvc
        - name: data
          persistentVolumeClaim:
            claimName: kavita-data-pvc
        - name: books
          persistentVolumeClaim:
            claimName: kavita-books-pvc-2
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kavita-config-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/kavita/config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kavita-config-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kavita-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kavita-books-pv-2
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/NAS/home-lab/data/kavita_books # NAS MNT
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kavita-books-pvc-2
  annotations:
    volume.beta.kubernetes.io/storage-class: ""
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: kavita
spec:
  type: NodePort
  selector:
    app: kavita
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
